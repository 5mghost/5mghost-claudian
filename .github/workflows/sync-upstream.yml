name: Sync Upstream

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/YishenTu/claudian.git
          git fetch upstream main --prune

      - name: Merge upstream into main
        id: merge
        run: |
          set -euo pipefail
          git checkout main

          if ! git merge --no-ff --no-edit upstream/main; then
            echo "Upstream merge conflict. Resolve manually and rerun."
            exit 1
          fi

          if git diff --quiet origin/main..HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push updated main
        if: steps.merge.outputs.has_changes == 'true'
        run: git push origin main

      - name: No upstream changes
        if: steps.merge.outputs.has_changes != 'true'
        run: echo "No upstream changes; main is already in sync."
