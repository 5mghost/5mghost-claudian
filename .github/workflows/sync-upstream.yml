name: Sync Upstream

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/YishenTu/claudian.git
          git fetch upstream main --prune

      - name: Merge upstream into bot branch
        id: merge
        run: |
          set -euo pipefail
          BRANCH="bot/sync-upstream-${GITHUB_RUN_ID}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git checkout -b "${BRANCH}" origin/main

          if ! git merge --no-ff --no-edit upstream/main; then
            echo "Upstream merge conflict. Resolve manually in a branch from main."
            exit 1
          fi

          if git diff --quiet origin/main..HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push bot branch
        if: steps.merge.outputs.has_changes == 'true'
        run: git push origin "${{ steps.merge.outputs.branch }}"

      - name: Open sync PR
        id: open_pr
        if: steps.merge.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "chore(sync): merge upstream/main ($(date -u +%Y-%m-%d))" \
            --body "Automated sync from \`YishenTu/claudian\` upstream into \`main\`."

      - name: Report PR creation permission issue
        if: steps.merge.outputs.has_changes == 'true' && steps.open_pr.outcome != 'success'
        run: |
          echo "::warning::Sync branch pushed, but PR creation was denied for GITHUB_TOKEN (Resource not accessible by integration)."
          echo "::warning::Enable repository setting 'Allow GitHub Actions to create and approve pull requests' or use a PAT secret for gh pr create."

      - name: No upstream changes
        if: steps.merge.outputs.has_changes != 'true'
        run: echo "No upstream changes; no PR created."
